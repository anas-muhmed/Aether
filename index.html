<html lang="en">

    <meta name="theme-color" content="#f7f7f4" />
    <meta name="description" content="Aether Commerce — remarkable technology, thoughtfully selected." />
    <script>
      (() => {
        try {
          if (window.localStorage.getItem('aether-theme') === 'dark' || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
            document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#0d0e11')
          }
        } catch {}
      })()
    </script>
